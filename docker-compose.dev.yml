version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# JIAYI TOOL — Local Development Docker Compose
#
# Starts only PostgreSQL so Strapi + Next.js can run with hot-reload locally.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   cd backend && npm run develop
#   cd frontend && npm run dev
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: jiayi_postgres_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       jiayi
      POSTGRES_USER:     jiayi
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jiayi"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
